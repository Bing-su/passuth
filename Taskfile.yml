# https://taskfile.dev

version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  update:cargo:
    cmds:
      - cargo update
    desc: Update Cargo dependencies

  update:pre-commit:
    cmds:
      - prek autoupdate
    desc: Update pre-commit hooks

  update:uv:
    cmds:
      - uv sync --upgrade --all-extras --all-groups
    desc: Update python dependencies

  update:
    deps:
      - update:cargo
      - update:pre-commit
      - update:uv
    desc: Update all dependencies
